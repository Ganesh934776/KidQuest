name: kidquest
description: A gamified parenting and child task management application.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11

  # State Management
  provider: ^6.1.5

  # Local Storage
  shared_preferences: ^2.5.3

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.8.0
  lottie: ^3.3.1

  # Progress
  percent_indicator: ^4.2.3

  # Date & Time
  intl: ^0.20.2

  # Icons
  flutter_svg: ^2.2.0

  # Sounds
  audioplayers: ^6.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/audio/